<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Para você 💌</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Feliz dia dos namorados, meu amor ❤️</h1>

    <p class="mensagem">
    Se eu fosse escrever tudo que sinto por você, faltaria papel, tinta e talvez até vida!

    </p>

<div class="container">

  <div class="galeria">
    <img src="foto1.jpg">
  </div>

</div>

  <button onclick="mostrarMensagem()">Clique aqui bb</button>

  <p id="surpresa" class="surpresa"></p>

</div>

  </div>

  <script>
    function mostrarMensagem() {
      document.getElementById("surpresa").innerText =
        "Que nos dias difíceis você nunca esqueça o quanto eu te amo. Mais do que isso… eu espero que a gente viva muitos e muitos momentos felizes juntos não só os difíceis, né rs. Às vezes, as palavras escritas conseguem dizer melhor o que o coração sente… e o que eu sinto é que, não importa o que venha pela frente, eu tô aqui. Sempre estarei. Pra te apoiar, crescer ao seu lado, dividir os fardos e celebrar cada conquista. Sempre digo que, quando você chegou… as coisas boas vieram junto. E desde então, tudo parece ter mais sentido. Aconteça o que acontecer, eu tô com você. E mesmo que, por algum motivo, nossos caminhos sigam diferentes um dia… ainda assim eu vou seguir feliz. Feliz por ter te conhecido, por tudo que a gente viveu, e por ter dividido um pedaço da minha história com você. Obrigada por fazer parte, por ficar, por entender e por ser quem é, não imagino uma vida sem você! Eu te amo… hoje, amanhã e sempre! ❤️"
    }
  </script>

<script>
function criarCoracao() {
  const coracao = document.createElement("div");
  coracao.classList.add("coracao");
  coracao.innerText = "❤️";

  coracao.style.left = Math.random() * 200 + "vw";
  coracao.style.animationDuration = (Math.random() * 3 + 2) + "s";

  document.body.appendChild(coracao);

  setTimeout(() => {
    coracao.remove();
  }, 5000);
}


setInterval(criarCoracao, 300);
</script>
</body>
</html>
